name: nabda
description: "نبضة - A comprehensive women's health app for cycle tracking, pregnancy monitoring, and baby care."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  provider: ^6.0.0
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  intl: ^0.19.0
  table_calendar: ^3.0.9
  fl_chart: ^0.65.0
  go_router: ^12.0.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5
  http: ^1.1.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  uuid: ^4.0.0
  equatable: ^2.0.5
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/Almarai-Light.ttf
          weight: 300
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400

