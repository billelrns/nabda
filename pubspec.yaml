name: nabda_app
description: NABDA - Women's Health App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  table_calendar: ^3.2.0
  fl_chart: ^1.0.0
  shared_preferences: ^2.5.0
  go_router: ^14.0.0
  provider: ^6.1.5
  rxdart: ^0.28.0
  sqflite: ^2.4.2
  simple_gesture_detector: ^0.2.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/